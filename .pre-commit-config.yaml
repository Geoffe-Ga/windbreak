# Pre-commit hooks configuration for hedgekit
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-json
  - id: check-added-large-files
    args:
    - --maxkb=500
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-symlinks
  - id: check-ast
  - id: debug-statements
  - id: check-docstring-first
  - id: detect-private-key
  - id: fix-byte-order-marker
  - id: mixed-line-ending
    args:
    - --fix=lf
  - id: no-commit-to-branch
    args:
    - --branch
    - main
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.1
  hooks:
  - id: ruff-check
    args:
    - --fix
  - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
  - id: mypy
    files: ^hedgekit/
    args:
    - --strict
    additional_dependencies:
    - types-PyYAML==6.0.12.20250915
    - types-requests==2.33.0.20260518
- repo: https://github.com/PyCQA/bandit
  rev: 1.9.3
  hooks:
  - id: bandit
    files: ^hedgekit/
    args:
    - -c
    - pyproject.toml
    additional_dependencies:
    - bandit[toml]
- repo: https://github.com/pypa/pip-audit
  rev: v2.10.0
  hooks:
  - id: pip-audit
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v3.0.0
  hooks:
  - id: conventional-pre-commit
    stages:
    - commit-msg
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.9.0.6
  hooks:
  - id: shellcheck
- repo: https://github.com/jendrikseipp/vulture
  rev: v2.10
  hooks:
  - id: vulture
    args:
    - hedgekit/
    - --min-confidence
    - '80'
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.4.0
  hooks:
  - id: detect-secrets
    args:
    - --baseline
    - .secrets.baseline
- repo: local
  hooks:
  - id: no-floats-money-paths
    name: no floats on money/price/probability paths
    entry: python scripts/lint_no_floats.py
    language: python
    # Keep this pattern in sync with DENYLISTED_PACKAGES in
    # scripts/lint_no_floats.py. The full-scan mode (lint.sh / CI) covers
    # any newly-added package automatically; this per-file hook does not
    # until the regex below is extended to match.
    files: ^hedgekit/(numeric|ledger|riskkernel)/.*\.py$
    pass_filenames: true
ci:
  autofix_commit_msg: 'style: auto-fix by pre-commit hooks'
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  skip: []
