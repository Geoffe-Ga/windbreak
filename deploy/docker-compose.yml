# hedgekit four-process deployment skeleton (issue #15, SPEC S5.1-S5.2, S14).
#
# One service per SPEC process. Every service runs the same image (built from
# the repo-root Dockerfile) and selects its process via `--process`. The
# services communicate only over the default network and the shared `ledger`
# volume; there is no custom `networks:` key. Only the dashboard publishes a
# port, and it is bound to loopback (SPEC S14: no public inbound).
services:
  pipeline:
    build: .
    command: ["hedgekit", "run", "--process", "pipeline"]
    restart: on-failure
    volumes:
      - ledger:/var/lib/hedgekit/ledger

  riskkernel:
    build: .
    command: ["hedgekit", "run", "--process", "riskkernel"]
    restart: on-failure
    volumes:
      - ledger:/var/lib/hedgekit/ledger

  order-gateway:
    build: .
    command: ["hedgekit", "run", "--process", "order_gateway"]
    restart: on-failure
    volumes:
      - ledger:/var/lib/hedgekit/ledger

  dashboard:
    build: .
    command: ["hedgekit", "run", "--process", "dashboard"]
    restart: on-failure
    # Dashboard reads the ledger without any trade authority (SPEC S5.1),
    # so its ledger mount is read-only.
    volumes:
      - ledger:/var/lib/hedgekit/ledger:ro
    # Loopback-only publish: the dashboard accepts no public inbound (SPEC S14).
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  ledger:
