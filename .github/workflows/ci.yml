name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# PR runs: a new push to the same PR cancels the superseded run (stale-head
# dedup). Push runs (main/develop): NEVER cancelled or queue-replaced — each
# gets a unique per-run group. Sharing one cancelable group per ref meant
# Ralph's post-merge `record completion` push (~15s after every squash merge)
# cancelled the merge commit's run, so every merge landed on main with 5
# cancelled jobs and no verification while the branch looked green.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MIN_COVERAGE: 90
  MIN_BRANCH_COVERAGE: 85
  PYTHON_VERSION_PRIMARY: "3.12"

# NOTE: Mutation testing is intentionally NOT run here. Per the owner directive
# in issue #107 it is a MANUAL pre-v1.0.0 release gate — see
# .github/workflows/mutation-gate.yml (workflow_dispatch only).

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -c constraints-quality.txt -r requirements.txt
          pip install -c constraints-quality.txt -r requirements-dev.txt
          pip install -e . -c constraints-quality.txt

      - name: Quality gate (identical to local)
        run: ./scripts/check-all.sh

      - name: Pre-commit (all files)
        # no-commit-to-branch guards LOCAL commit-time only. On push-event runs
        # actions/checkout attaches HEAD to main, so the hook fails on every
        # merge (a category error — the commit already passed its PR gates),
        # while PR-event runs pass via the detached merge ref. Skipping it here
        # is not a gate-weakening: every other hook still runs, and the hook
        # itself stays active for local commits. Issue #127.
        env:
          SKIP: no-commit-to-branch
        run: |
          pip install -c constraints-quality.txt pre-commit
          pre-commit run --all-files --show-diff-on-failure

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .coverage
            pytest.xml
          retention-days: 30

  chaos:
    name: Chaos Suite (SPEC §11.5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION_PRIMARY }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -c constraints-quality.txt -r requirements.txt
          pip install -c constraints-quality.txt -r requirements-dev.txt
          pip install -e . -c constraints-quality.txt

      - name: Chaos suite (fault-injection invariants)
        # This is NOT a gate weakening. --no-cov disables coverage collection
        # AND the --cov-fail-under=90 enforcement for THIS job only; the 90%
        # full-suite coverage gate is still enforced by the `quality` job,
        # where the chaos tests also run and contribute their coverage. This
        # `chaos` job is an isolated, merge-gating FUNCTIONAL signal that fails
        # the build on any SPEC §11.5 invariant breach. --strict-markers /
        # --strict-config stay active (we deliberately avoid --override-ini /
        # -o addopts=, which would silently drop them).
        run: pytest -m chaos --no-cov -v

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution packages
        run: |
          python -m build

      - name: Check distribution packages
        run: |
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30
