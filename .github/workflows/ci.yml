name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_COVERAGE: 90
  MIN_BRANCH_COVERAGE: 85
  PYTHON_VERSION_PRIMARY: "3.12"

# NOTE: Mutation testing is intentionally NOT run here. Per the owner directive
# in issue #107 it is a MANUAL pre-v1.0.0 release gate — see
# .github/workflows/mutation-gate.yml (workflow_dispatch only).

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt || true
          pip install pytest pytest-cov pytest-xdist ruff pylint mypy bandit pip-audit coverage[toml]

      - name: Code formatting check (ruff)
        run: |
          ruff format --check .

      - name: Linting (ruff)
        run: |
          ruff check .

      - name: Linting (pylint)
        run: |
          pylint **/*.py --exit-zero || pylint $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" -not -path "./build/*" -not -path "./dist/*") --fail-under=8.0

      - name: Type checking (mypy)
        run: |
          mypy . --ignore-missing-imports --no-strict-optional || true

      - name: Security scan (bandit)
        run: |
          bandit -r . -f json -o bandit-report.json --severity-level medium --confidence-level medium || true
          bandit -r . -ll -ii

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit --desc --skip-editable

      - name: Run tests with coverage
        run: |
          pytest -v --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing --cov-branch --cov-fail-under=${{ env.MIN_COVERAGE }} -n auto

      - name: Check coverage thresholds
        run: |
          coverage report --fail-under=${{ env.MIN_COVERAGE }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
            bandit-report.json
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .coverage
            pytest.xml
          retention-days: 30

  complexity-analysis:
    name: Complexity Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install analysis tools
        run: |
          pip install radon xenon

      - name: Calculate cyclomatic complexity
        run: |
          radon cc . -a -nb

      - name: Calculate maintainability index
        run: |
          radon mi . -nb

      - name: Check complexity thresholds
        run: |
          xenon --max-absolute B --max-modules A --max-average A . || true

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution packages
        run: |
          python -m build

      - name: Check distribution packages
        run: |
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30