name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_COVERAGE: 90
  MIN_BRANCH_COVERAGE: 85
  MIN_MUTATION_SCORE: 80
  PYTHON_VERSION_PRIMARY: "3.12"

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -c constraints-quality.txt -r requirements.txt
          pip install -c constraints-quality.txt -r requirements-dev.txt
          pip install -e . -c constraints-quality.txt

      - name: Quality gate (identical to local)
        run: ./scripts/check-all.sh

      - name: Pre-commit (all files)
        run: |
          pip install -c constraints-quality.txt pre-commit
          pre-commit run --all-files --show-diff-on-failure

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        if: matrix.python-version == env.PYTHON_VERSION_PRIMARY
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .coverage
            pytest.xml
          retention-days: 30

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -c constraints-quality.txt -r requirements.txt
          pip install -c constraints-quality.txt -r requirements-dev.txt
          pip install -c constraints-quality.txt pytest mutmut

      - name: Run mutation tests
        run: |
          mutmut run --paths-to-mutate=. || true
          mutmut results
          mutmut html

      - name: Check mutation score
        run: |
          MUTATION_SCORE=$(mutmut results | grep -oP 'Survived: \K\d+' || echo "100")
          TOTAL=$(mutmut results | grep -oP 'Total: \K\d+' || echo "1")
          SCORE=$((100 - (MUTATION_SCORE * 100 / TOTAL)))
          echo "Mutation score: $SCORE%"
          if [ $SCORE -lt ${{ env.MIN_MUTATION_SCORE }} ]; then
            echo "Mutation score $SCORE% is below minimum threshold of ${{ env.MIN_MUTATION_SCORE }}%"
            exit 1
          fi

      - name: Upload mutation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: html/
          retention-days: 30

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_PRIMARY }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution packages
        run: |
          python -m build

      - name: Check distribution packages
        run: |
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30
