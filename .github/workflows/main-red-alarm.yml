name: "Main-red alarm"

# A red main must never go unnoticed. When the CI workflow completes on main
# with a failure, this files (or updates) exactly one open P0 issue labeled
# `ci-red`. The Ralph loop treats an open ci-red issue as drop-everything work:
# the next wake dispatches ci-debugging on it immediately. Owner directive,
# issue #127.
#
# Dedup contract: at most one open ci-red issue at a time — a repeat failure
# comments on the existing issue instead of filing a new one.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  issues: write

concurrency:
  group: main-red-alarm
  cancel-in-progress: false

jobs:
  alarm:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: File or update the single open ci-red issue
        run: |
          set -euo pipefail
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label ci-red --state open --limit 1 --json number --jq '.[0].number // empty')
          BODY="CI on \`main\` failed at \`${HEAD_SHA:0:7}\`: $RUN_URL"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Still red — $BODY"
            echo "Commented on existing ci-red issue #$EXISTING" >> "$GITHUB_STEP_SUMMARY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "P0: CI is red on main" \
              --label "ci-red,P0,bug" \
              --body "$BODY

**Protocol (Ralph):** this is drop-everything work. Reproduce via the run link, fix the root cause with ci-debugging (failing-test-first), never weaken a gate. Close only when CI on \`main\` is green again." \
              >> "$GITHUB_STEP_SUMMARY"
          fi
