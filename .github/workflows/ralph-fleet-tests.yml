name: Ralph Fleet Tests

# Shell-test suite for the Ralph fleet mechanics under scripts/ralph/ (fleet.sh,
# pick-next.sh, pr-ready.sh, queue-depth.sh, and the scan-workflow static
# guard). These scripts live outside tests/, so the main `pytest`-based CI job
# doesn't cover them — this workflow keeps the parallel worktree fleet, the
# picker's parallel-awareness, the hopper's queue-depth measure, the scan
# workflows' startup-safety, and the PR-readiness classifier honest. (The
# Discord recap's pure stats math is a separate concern, tested at
# tests/test_ralph_recap_stats.py and covered by the main CI job's `pytest` +
# mypy steps — see .claude/skills/discord-ralph-recap/.)
#
# test_provision_venv.sh (issue #133) covers scripts/provision-venv.sh — the
# shared repo-local .venv provisioner every fleet worktree reuses — plus a
# static grep-only guard over scripts/check-all.sh (must invoke
# `provision-venv.sh --check`, prepend `.venv/bin` to PATH, and keep the venv
# optional), so both files are in this workflow's path filters even though
# check-all.sh isn't itself a scripts/ralph/ file.
#
# The scan/hopper workflow paths are triggers too: test_scan_workflows.sh guards
# those files (startup permissions, repo-layout paths), and test_deslop_workflow.sh
# guards deslop.yml + deslop-areas.json (root-only Python layout, real area
# paths), so an edit to any of them must re-run this suite even when no
# scripts/ralph/ file changes.
#
# This suite also guards code-review.yml's verdict-comment verification (issues
# #135/#140): test_assert_review_posted.sh covers assert-review-posted.sh (the
# post-gate that proves a FRESH verdict comment landed) plus static assertions
# over code-review.yml itself (the REVIEW_STARTED_AT-before-action ordering, no
# use_sticky_comment, env-mapped token). assert-review-posted.sh shares its
# verdict regex with pr-ready.sh via verdict-regex.sh — the single source of
# truth whose drift is the class of silent-stall bug #135 fixes — so
# code-review.yml is a path trigger here too.

on:
  push:
    paths:
      - "scripts/ralph/**"
      - "scripts/provision-venv.sh"
      - "scripts/check-all.sh"
      - ".github/workflows/ralph-fleet-tests.yml"
      - ".github/workflows/_claude-scan.yml"
      - ".github/workflows/scan-*.yml"
      - ".github/workflows/hopper.yml"
      - ".github/workflows/deslop.yml"
      - ".github/workflows/code-review.yml"
      - ".github/deslop-areas.json"
  pull_request:
    paths:
      - "scripts/ralph/**"
      - "scripts/provision-venv.sh"
      - "scripts/check-all.sh"
      - ".github/workflows/ralph-fleet-tests.yml"
      - ".github/workflows/_claude-scan.yml"
      - ".github/workflows/scan-*.yml"
      - ".github/workflows/hopper.yml"
      - ".github/workflows/deslop.yml"
      - ".github/workflows/code-review.yml"
      - ".github/deslop-areas.json"

permissions:
  contents: read

jobs:
  fleet-tests:
    name: Fleet + picker + pr-ready shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run fleet + picker + pr-ready shell tests
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash scripts/ralph/test_fleet.sh
          bash scripts/ralph/test_pick_next.sh
          bash scripts/ralph/test_pr_ready.sh
          bash scripts/ralph/test_queue_depth.sh
          bash scripts/ralph/test_provision_venv.sh
          bash scripts/ralph/test_scan_workflows.sh
          bash scripts/ralph/test_deslop_workflow.sh
          bash scripts/ralph/test_assert_review_posted.sh
