name: Code Review

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  # write is required by the deterministic "Post review" step below (#152),
  # which posts the verdict comment with the workflow's own token. The review
  # AGENT itself has no write-capable tools at all — see claude_args.
  pull-requests: write
  issues: read
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Record the review window's start BEFORE the action runs (issue #135): the
      # post-gate below only counts verdict comments with createdAt >= this
      # timestamp, so a stale verdict from a prior run cannot satisfy this run.
      # Timing it here (pre-action) is load-bearing — capturing it after the
      # action would time the wrong window and let a comment posted before the
      # window slip through.
      - name: Record review start time
        run: echo "REVIEW_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request against the repository's CLAUDE.md. Read the
            change with `gh pr diff` and `gh pr view` (and any files you need).

            Do NOT post a comment yourself. Return ONLY the structured result with
            three fields:

            - "review_markdown": the full review as GitHub markdown, using this
              template (omit the verdict here — it is a separate field below):

              ## Summary
              Brief overview (2-3 sentences)
              ## Strengths
              What's done well?
              ## Security Concerns
              Vulnerabilities? 🔴 BLOCKING | 🟡 HIGH | 🟢 LOW
              ## Problems
              Critical issues blocking merge (mark 🔴)
              Consider priority greater than Minor as "Blocking"
              ## Code Quality
              Non-blocking improvements (these are COMMENTS, not blockers)
              ## CLAUDE.md Adherence
              ✅/❌ Coverage, linting, types, patterns, commits
              ## Testing
              Test quality evaluation (insufficient testing is BLOCKING — mark 🔴)
              ## Documentation
              Docs completeness

            - "verdict": exactly one of CHANGES_REQUESTED, COMMENTS, LGTM. Take a
              clear stance — do NOT default to COMMENTS as a safe middle ground.
              Reason about it like this:

                1. Is there ANY blocking problem? A real bug, a 🔴 security issue,
                   insufficient/missing tests, or a CLAUDE.md violation that must
                   be fixed before merge → CHANGES_REQUESTED.
                2. Otherwise, would you merge this as-is right now? If the only
                   remarks are nits you would not block on (or there is nothing to
                   note), say so → LGTM. Minor style nits do NOT downgrade an
                   otherwise-mergeable PR.
                3. Reserve COMMENTS for the genuine middle: nothing blocks merge,
                   but there ARE substantive non-blocking suggestions the author
                   should weigh first. If you reach for COMMENTS, name the specific
                   suggestion that keeps it out of LGTM — if you can't, it's LGTM.

            - "verdict_rationale": one or two sentences justifying the verdict,
              required for ALL THREE outcomes. For CHANGES_REQUESTED, name the
              blocking issue(s). For COMMENTS, name the substantive suggestion(s)
              that kept it from LGTM. For LGTM, state why it is ready to merge.

            Use the repository's CLAUDE.md for guidance on style and conventions.
            Be constructive and helpful in your feedback.

          # The --json-schema flag makes the action return a validated
          # ``structured_output`` JSON string (verdict + rationale +
          # review_markdown) instead of relying on the agent to remember to post
          # a comment — the "Post review" step below then posts it
          # deterministically. This fixes the ~50% flake where the agent
          # completed "successfully" without ever posting its verdict (#152).
          #
          # Security: the agent's allowed-tools are now ALL read-only —
          # `gh pr comment` is intentionally absent so the agent cannot post (or
          # be prompt-injected into posting) anything on its own; the only write
          # in this workflow is the deterministic step below, which posts exactly
          # the schema-validated fields and nothing else.
          #
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # for allowed-tools syntax and security model.
          claude_args: >-
            --json-schema '{"type":"object","additionalProperties":false,"required":["verdict","verdict_rationale","review_markdown"],"properties":{"verdict":{"type":"string","enum":["CHANGES_REQUESTED","COMMENTS","LGTM"]},"verdict_rationale":{"type":"string"},"review_markdown":{"type":"string"}}}'
            --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"

      # Deterministic posting (#152): the review agent no longer posts its own
      # comment — this step does, from the action's schema-validated
      # ``structured_output``, so a completed review can never again silently
      # fail to land its verdict. If there is NO structured output, this step
      # does not guess at the reason: it defers (exit 0, with a warning) to the
      # "Assert the review verdict comment was posted" backstop below, which
      # already distinguishes every real failure mode — the silent stall (#135),
      # the instant is_error (#140), and the workflow validation guard skip on
      # PRs that edit this file — with a precise message for each, and turns the
      # job red. The gate is therefore never weakened: no verdict comment still
      # means a failed check.
      - name: Post review
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          STRUCTURED: ${{ steps.claude-review.outputs.structured_output }}
        run: |
          set -euo pipefail
          if [ -z "${STRUCTURED:-}" ]; then
            echo "::warning::No structured output from the review action — deferring to the assert step for the precise failure reason."
            exit 0
          fi
          verdict=$(jq -r '.verdict' <<<"$STRUCTURED")
          rationale=$(jq -r '.verdict_rationale // ""' <<<"$STRUCTURED")
          jq -r '.review_markdown' <<<"$STRUCTURED" > review.md
          # Keep the "## Verdict: <verdict>" line exactly — pr-ready.sh and
          # assert-review-posted.sh parse it via scripts/ralph/verdict-regex.sh.
          # The rationale goes on the following line so the verdict line itself
          # is never ambiguous.
          printf '\n\n## Verdict: %s\n' "$verdict" >> review.md
          if [ -n "$rationale" ]; then
            printf '\n%s\n' "$rationale" >> review.md
          fi
          gh pr comment "$PR_NUMBER" -R "$REPO" --body-file review.md
          echo "Posted review with verdict: ${verdict}"

      # Regression guard for #135 (silent-success stall) and #140 (expired-token
      # instant is_error incident). The action above can go GREEN without ever
      # producing a review — either by finishing "successfully" but silently (the
      # #135 stall, where pr-ready.sh then reports awaiting-review forever) or by
      # failing INSTANTLY on an OAuth/credit error while the step still reports
      # success (the #140 incident). This step turns both into a loud failure:
      # it reads the action's own is_error flag AND asserts a fresh
      # verdict-bearing comment (createdAt >= REVIEW_STARTED_AT) actually landed.
      # With deterministic posting (#152) the comment normally lands via the
      # "Post review" step above; this remains the authoritative backstop that
      # keeps the check red whenever it did not.
      #
      # DO NOT switch the action above into sticky-comment mode (the action's
      # single-edited-in-place review comment): a sticky comment is EDITED in
      # place, which bumps updatedAt but NOT createdAt — and both this gate and
      # pr-ready.sh key freshness on createdAt, so a sticky verdict from a prior
      # run would look stale forever and permanently starve the lane. The
      # fleet-tests suite statically asserts that mode stays off.
      #
      # WORKFLOW VALIDATION GUARD (by design): PRs that modify this workflow file
      # cannot receive an automated review — claude-code-action's workflow
      # validation guard (a workflow validation check on the merge ref) skips the
      # agent on any PR whose merge ref changes the invoking workflow (the step
      # still exits success with no verdict and an empty execution_file). The
      # claude-review check therefore stays red BY
      # DESIGN (no rerun can help until merge); assert-review-posted.sh detects
      # the workflow-file diff and says so instead of the misleading generic
      # rerun message. Such a PR requires operator review + admin merge. This
      # self-approval-prevention posture is CORRECT, not a bug.
      #
      # Every value flows into the run: body through env: — no inline ${{ }} in
      # the script — for injection-safety and actionlint/shellcheck cleanliness.
      # REVIEW_STARTED_AT was exported into $GITHUB_ENV by the "Record review
      # start time" step; it is re-surfaced here via `env.REVIEW_STARTED_AT` (NOT
      # re-wrapped inside the run: body) so shellcheck sees the shell var as
      # assigned — a bare $VAR that is only set via $GITHUB_ENV upstream trips
      # SC2154 (referenced-but-not-assigned) in the analyzed fragment. The job
      # grants pull-requests: write (for the posting step above), which covers
      # all `gh pr view --json comments` needs. The repo is already
      # checked out (step 1), so scripts/ralph/assert-review-posted.sh is on disk.
      - name: Assert the review verdict comment was posted
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEW_STARTED_AT: ${{ env.REVIEW_STARTED_AT }}
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          bash scripts/ralph/assert-review-posted.sh "$PR_NUMBER" "$REVIEW_STARTED_AT" \
            --repo "$REPO" --execution-file "$EXECUTION_FILE"
